<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fabric Inventory QR Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
}

/* Container */
.container {
    max-width: 420px;
    margin: 30px auto;
}

/* Card */
.card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.item-name {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 5px;
}

.brand {
    color: #777;
    margin-bottom: 10px;
}

.row {
    margin: 8px 0;
}

.label {
    font-weight: bold;
}

.stock-box {
    margin: 12px 0;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    text-align: center;
}

.green { background: #d4edda; color: #155724; }
.yellow { background: #fff3cd; color: #856404; }
.red { background: #f8d7da; color: #721c24; }

.price {
    font-size: 20px;
    font-weight: bold;
    color: #5a67d8;
    margin-top: 10px;
}

/* Buttons */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.add { background: #28a745; color: #fff; }
.remove { background: #dc3545; color: #fff; }

button:hover {
    transform: scale(1.05);
}

/* QR section */
.qr-box {
    text-align: center;
    margin-top: 20px;
}

.qr-box img {
    width: 150px;
}

.note {
    font-size: 12px;
    color: #ddd;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="item-name" id="name">KG CRM Solutions</div>
        <div class="brand" id="brand">Zoho Dashboard</div>

        <div class="row"><span class="label">Color:</span> Ocean Blue</div>
        <div class="row"><span class="label">SKU:</span> TXP-OCB-1023</div>

        <div class="row"><span class="label">Stock:</span> <span id="stock">65</span> meters</div>

        <div id="status" class="stock-box"></div>

        <div class="row"><span class="label">Width:</span> 58 inches</div>
        <div class="row"><span class="label">GSM:</span> 180</div>
        <div class="row"><span class="label">Composition:</span> 100% Cotton</div>
        <div class="row"><span class="label">Finish:</span> Soft Finish</div>

        <div class="price">₹250 / meter</div>

        <div class="row"><span class="label">Origin:</span> India</div>

        <div class="buttons">
            <button class="add" onclick="changeStock(5)">➕ Add</button>
            <button class="remove" onclick="changeStock(-5)">➖ Remove</button>
        </div>
    </div>

    <!-- QR Code -->
    <div class="qr-box">
        <h3 style="color:white;">Scan QR</h3>
        <img id="qr">
    </div>

    <div class="note">Scan this QR to open same dashboard</div>

</div>

<script>
let stock = 65;

// Update stock UI
function updateUI() {
    document.getElementById("stock").innerText = stock;

    let statusBox = document.getElementById("status");

    if (stock === 0) {
        statusBox.className = "stock-box red";
        statusBox.innerText = "🔴 Out of Stock";
    } else if (stock <= 50) {
        statusBox.className = "stock-box yellow";
        statusBox.innerText = "🟡 Low Stock";
    } else {
        statusBox.className = "stock-box green";
        statusBox.innerText = "🟢 In Stock";
    }
}

// Add/remove stock
function changeStock(val) {
    stock += val;
    if (stock < 0) stock = 0;
    updateUI();
}

// Generate QR code (current page URL)
let qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(window.location.href);
document.getElementById("qr").src = qrUrl;

// Init
updateUI();
</script>

</body>
</html>
